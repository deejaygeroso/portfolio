name: Production Pipeline

on:
  push:
    branches:
      - main

permissions:
  actions: read
  contents: write
  id-token: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      # Checkout the repository
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Setup and Install Dependencies
      - name: Setup and Install Dependencies
        uses: ./.github/actions/setup
        with:
          node_version: '24.11.1'
          pnpm_version: '10.24.0'

      # Set Version Tag
      - name: Set Version Tag
        id: lib-version
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      # Set Flag if Tag Exist
      - name: Set Flag if Tag Exist
        id: tag
        run: |
          echo "TAG_EXISTS=$(git ls-remote --tags origin refs/tags/v${{ steps.lib-version.outputs.VERSION }})" >> $GITHUB_OUTPUT

      - name: Extract latest changelog
        run: |
          awk '/^## [-1-9]+\.[0-9]+\.[0-9]+/ { if (found) exit; found=1 } found { print }' CHANGELOG.md > RELEASE_NOTES.md

      # Only push and release tag if it does not yet exist.
      - name: Release Tag
        if: steps.tag.outputs.TAG_EXISTS == ''
        uses: softprops/action-gh-release@v1
        with:
          body_path: RELEASE_NOTES.md
          tag_name: v${{ steps.lib-version.outputs.VERSION }}
          draft: false
          prerelease: false

  smoke-test:
    needs: release
    runs-on: ubuntu-latest
    steps:
      # Checkout the repository
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Setup and Install Dependencies
      - name: Setup and Install Dependencies
        uses: ./.github/actions/setup
        with:
          node_version: '24.11.1'
          pnpm_version: '10.24.0'

      # Wait for Render to finish deploying
      - name: Wait for Render deploy
        run: sleep 60

      # Install Playwright Chromium
      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps chromium

      # Run prod smoke tests
      - name: Run Smoke Tests (prod)
        run: pnpm test:e2e:prod

      # Upload report on failure
      - name: Upload Playwright Report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-prod
          path: playwright-report/
          retention-days: 7
