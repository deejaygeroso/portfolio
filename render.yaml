services:
  - type: web
    name: portfolio
    runtime: static
    buildCommand: pnpm build
    staticPublishPath: ./out
    headers:
      # Next.js hashed static assets (JS, CSS, fonts, images) — safe to cache forever
      - path: /_next/static/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      # Public directory assets (wallpaper, favicons, etc.)
      - path: /public/*
        name: Cache-Control
        value: public, max-age=86400
      # HTML pages — must revalidate so deploys propagate instantly
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
